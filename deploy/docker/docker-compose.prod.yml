services:
  caddy:
    image: caddy:2.8-alpine
    env_file:
      - ../.env.prod
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - /opt/lab-ecosystem/dist:/srv:ro
      - /srv/lab-static:/srv/lab-static:ro
      - caddy_data_prod:/data
      - caddy_config_prod:/config
    networks:
      - lab_net
    restart: unless-stopped

  backend:
    image: lab-backend:latest
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
    env_file:
      - ../.env.prod
    expose:
      - '8000'
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads_data:/app/static/uploads
    networks:
      - lab_net
    restart: unless-stopped
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 6

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    networks:
      - lab_net
    restart: unless-stopped
    healthcheck:
      test: [CMD, mongosh, --quiet, --eval, "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  caddy_data_prod:
  caddy_config_prod:
  mongo_data:
  uploads_data:

networks:
  lab_net:
    driver: bridge
